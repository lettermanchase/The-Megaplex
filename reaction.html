<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflex Lab - Arcade</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #100b16, #200f33, #150921); 
            color: #fff; margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; overflow: hidden; user-select: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-15px); }
            20%, 40%, 60%, 80% { transform: translateX(15px); }
        }
        @keyframes pulseGreen {
            0% { box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 0 0 0 rgba(16, 172, 132, 0.8); }
            100% { box-shadow: inset 0 0 80px rgba(16, 172, 132, 0.6), 0 0 60px 20px rgba(16, 172, 132, 0); }
        }
        @keyframes pulseWaiting {
            0%, 100% { background-color: #ee5253; }
            50% { background-color: #c0392b; }
        }
        @keyframes flashRecord {
            0%, 100% { transform: scale(1); text-shadow: 0 0 0 transparent; }
            50% { transform: scale(1.3); text-shadow: 0 0 30px #1dd1a1; }
        }
        @keyframes particleBurst {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        @keyframes slideIn {
            from { transform: translateX(-30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        header { 
            padding: 15px 30px; background: rgba(0,0,0,0.8); z-index: 10;
            border-bottom: 2px solid #1dd1a1; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(29, 209, 161, 0.2);
        }
        .back-btn {
            background: transparent; border: 2px solid #1dd1a1; color: #1dd1a1; padding: 8px 20px;
            border-radius: 20px; text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .back-btn:hover { background: #1dd1a1; color: #000; box-shadow: 0 0 10px #1dd1a1; }

        .game-wrapper {
            display: flex; flex: 1; padding: 20px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box;
        }

        .dashboard {
            width: 350px; background: rgba(0,0,0,0.5); border-radius: 20px; padding: 25px;
            border: 1px solid rgba(29, 209, 161, 0.3); display: flex; flex-direction: column; gap: 18px;
            overflow-y: auto;
        }
        .dashboard h3 { margin: 0; color: #48dbfb; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .mode-btn {
            background: rgba(255,255,255,0.1); border: 1px solid transparent; color: white; padding: 12px;
            border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 0.95em; flex: 1;
        }
        .mode-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .mode-btn.active { background: #1dd1a1; color: #000; box-shadow: 0 0 15px rgba(29,209,161,0.5); }

        .stat-box { 
            background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; border-left: 4px solid #feca57; 
            transition: transform 0.2s;
        }
        .stat-box:hover { transform: translateX(5px); }
        .stat-label { font-size: 0.9em; color: #a4b0be; }
        .stat-value { font-size: 1.8em; font-weight: bold; color: #feca57; margin-top: 5px; }
        
        .streak-display {
            display: flex; align-items: center; gap: 8px;
            font-size: 1.5em; font-weight: bold; color: #ff6b6b;
        }
        .streak-flame { font-size: 1.2em; animation: flashRecord 1s infinite; }

        .history-list { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; }
        .history-list li { 
            padding: 8px 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; 
            color: #c8d6e5; animation: slideIn 0.3s ease-out; border-radius: 5px;
        }
        .history-list li:hover { background: rgba(255,255,255,0.05); }
        .history-list li.best { background: rgba(29,209,161,0.15); border-left: 3px solid #1dd1a1; }

        .reaction-pad {
            flex: 1; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: background-color 0.15s, transform 0.1s; 
            border: 2px solid rgba(255,255,255,0.1);
            background: #2f3640;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }
        .reaction-pad:active { transform: scale(0.99); }
        .reaction-pad.shake { animation: shake 0.5s; }
        .reaction-pad.pulse-ready { animation: pulseGreen 0.6s ease-out; }
        .reaction-pad.pulse-waiting { animation: pulseWaiting 1.5s infinite; }

        .pad-icon { font-size: 6em; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(0,0,0,0.5)); transition: transform 0.3s; }
        .pad-text { font-size: 3.5em; font-weight: bold; text-shadow: 2px 2px 15px rgba(0,0,0,0.7); text-align: center; letter-spacing: 1px; }
        .pad-subtext { font-size: 1.4em; opacity: 0.85; margin-top: 15px; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); text-align: center; }
        .pad-comparison { font-size: 1.1em; margin-top: 20px; padding: 8px 20px; border-radius: 20px; background: rgba(0,0,0,0.4); }

        .status-idle { background: linear-gradient(135deg, #2f3640, #1e272e); }
        .status-waiting { background: #ee5253; color: #fff; }
        .status-ready { background: linear-gradient(135deg, #10ac84, #1dd1a1); color: #fff; }
        .status-early { background: linear-gradient(135deg, #feca57, #ff9f43); color: #000; }
        .status-result { background: linear-gradient(135deg, #341f97, #5f27cd); color: #fff; }

        .particle {
            position: absolute; width: 10px; height: 10px; border-radius: 50%;
            pointer-events: none; animation: particleBurst 1s ease-out forwards;
        }

        .progress-container { width: 80%; max-width: 400px; margin-top: 20px; }
        .progress-bar { 
            height: 8px; background: rgba(0,0,0,0.4); border-radius: 4px; overflow: hidden; 
        }
        .progress-fill { 
            height: 100%; background: linear-gradient(90deg, #48dbfb, #1dd1a1); 
            transition: width 0.4s ease; border-radius: 4px;
        }

        .sound-toggle {
            background: transparent; border: 1px solid #48dbfb; color: #48dbfb;
            padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 0.85em;
        }
        .sound-toggle:hover { background: #48dbfb; color: #000; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">⬅ Back to Hub</a>
        <h2 style="margin:0; color:#fff;">⚡ Reflex Lab</h2>
        <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊 Sound: ON</button>
    </header>

    <div class="game-wrapper">
        
        <div class="dashboard">
            <div>
                <h3>Game Mode</h3>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="mode-btn active" id="btn-classic" onclick="setMode('classic')">Classic</button>
                    <button class="mode-btn" id="btn-tourney" onclick="setMode('tourney')">Tourney (5)</button>
                </div>
            </div>

            <div class="stat-box">
                <div class="stat-label">🏆 Global Best Time</div>
                <div class="stat-value" id="bestTimeDisplay">--- ms</div>
            </div>

            <div class="stat-box" style="border-left-color: #ff6b6b;">
                <div class="stat-label">🔥 Current Streak</div>
                <div class="streak-display">
                    <span id="streakValue">0</span>
                    <span class="streak-flame" id="streakFlame" style="display:none;">🔥</span>
                </div>
            </div>
            
            <div class="stat-box" style="border-left-color: #48dbfb;">
                <div class="stat-label">🎖️ Your Reflex Rank</div>
                <div class="stat-value" id="rankDisplay" style="color: #48dbfb; font-size: 1.4em;">Unranked</div>
            </div>

            <div>
                <h3>📊 Recent Attempts</h3>
                <ul class="history-list" id="historyList">
                    <li><span style="opacity:0.5;">No attempts yet.</span></li>
                </ul>
            </div>
        </div>

        <div class="reaction-pad status-idle" id="pad">
            <div class="pad-icon" id="padIcon">⚡</div>
            <div class="pad-text" id="padText">Click to Start</div>
            <div class="pad-subtext" id="padSubText">Click or press SPACE when screen turns green!</div>
            <div class="pad-comparison" id="padComparison" style="display:none;"></div>
            <div class="progress-container" id="progressContainer" style="display:none;">
                <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            </div>
        </div>

    </div>

    <script>
        // --- Game State ---
        let state = 'idle';
        let mode = 'classic';
        let startTime = 0;
        let timeoutId = null;
        let recentScores = [];
        let tourneyScores = [];
        let streak = 0;
        let soundOn = true;
        let lastScore = null;
        
        // --- Audio ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function playTone(freq, duration, type = 'sine', volume = 0.3) {
            if (!soundOn) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        function sndGo()      { playTone(880, 0.15, 'square', 0.2); }
        function sndSuccess() { playTone(660, 0.1); setTimeout(()=>playTone(880, 0.15), 100); }
        function sndEarly()   { playTone(200, 0.4, 'sawtooth', 0.3); }
        function sndRecord()  { playTone(523, 0.1); setTimeout(()=>playTone(659, 0.1), 100); setTimeout(()=>playTone(784, 0.2), 200); }

        function toggleSound() {
            soundOn = !soundOn;
            document.getElementById('soundToggle').innerText = soundOn ? '🔊 Sound: ON' : '🔇 Sound: OFF';
        }

        // --- 🔑 FIX: Helper to safely get current best (handles undefined) ---
        function getCurrentBest() {
            const scores = JSON.parse(localStorage.getItem('arcadeScores')) || {};
            // If reaction key doesn't exist OR is undefined/null, treat as 9999 (default)
            return (scores.reaction === undefined || scores.reaction === null) ? 9999 : scores.reaction;
        }

        // --- Load Saved Data ---
        const bestTimeDisplay = document.getElementById('bestTimeDisplay');
        const initialBest = getCurrentBest();
        if (initialBest !== 9999) {
            bestTimeDisplay.innerText = initialBest + ' ms';
        }

        // --- DOM ---
        const pad = document.getElementById('pad');
        const padIcon = document.getElementById('padIcon');
        const padText = document.getElementById('padText');
        const padSubText = document.getElementById('padSubText');
        const padComparison = document.getElementById('padComparison');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        
        // --- Mode Switch ---
        function setMode(newMode) {
            if (state === 'waiting' || state === 'ready') return;
            mode = newMode;
            document.getElementById('btn-classic').classList.remove('active');
            document.getElementById('btn-tourney').classList.remove('active');
            document.getElementById(`btn-${newMode}`).classList.add('active');
            tourneyScores = [];
            resetPad();
            progressContainer.style.display = mode === 'tourney' ? 'block' : 'none';
            updateProgress();
        }

        function updateProgress() {
            const pct = (tourneyScores.length / 5) * 100;
            progressFill.style.width = pct + '%';
        }

        // --- Inputs ---
        pad.addEventListener('mousedown', handleClick);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); handleClick(); }
        });

        function handleClick() {
            initAudio();
            if (state === 'idle' || state === 'result' || state === 'early') startRound();
            else if (state === 'waiting') triggerEarly();
            else if (state === 'ready') triggerSuccess();
        }

        function setPadState(newState, icon, text, subtext, statusClass, extraClass = '') {
            state = newState;
            padIcon.innerText = icon;
            padText.innerText = text;
            padSubText.innerText = subtext;
            pad.className = 'reaction-pad ' + statusClass + ' ' + extraClass;
            padComparison.style.display = 'none';
        }

        function resetPad() {
            setPadState('idle', '⚡', 'Click to Start', 'Click or press SPACE when screen turns green!', 'status-idle');
        }

        function startRound() {
            let subTxt = mode === 'tourney' ? `Round ${tourneyScores.length + 1} of 5 — wait...` : 'Wait for green... DO NOT click!';
            setPadState('waiting', '🛑', 'Wait...', subTxt, 'status-waiting', 'pulse-waiting');
            const delay = Math.floor(Math.random() * 3500) + 1500;
            clearTimeout(timeoutId);
            timeoutId = setTimeout(() => {
                setPadState('ready', '🟢', 'CLICK NOW!', '', 'status-ready', 'pulse-ready');
                sndGo();
                startTime = performance.now();
            }, delay);
        }

        function triggerEarly() {
            clearTimeout(timeoutId);
            sndEarly();
            streak = 0;
            updateStreakUI();
            setPadState('early', '⚠️', 'Too Early!', 'You jumped the gun! Click to try again.', 'status-early', 'shake');
            if (mode === 'tourney') { tourneyScores = []; updateProgress(); }
        }

        function triggerSuccess() {
            const reactionTime = Math.round(performance.now() - startTime);
            sndSuccess();
            spawnParticles();
            
            if (mode === 'classic') {
                finishRound(reactionTime);
                showResult(reactionTime, 'Click to try again.');
            } else {
                tourneyScores.push(reactionTime);
                updateProgress();
                if (tourneyScores.length >= 5) {
                    const avg = Math.floor(tourneyScores.reduce((a,b)=>a+b,0) / 5);
                    finishRound(avg);
                    setPadState('result', '🏆', `AVG: ${avg} ms`, 'Tournament Complete! Click to restart.', 'status-result');
                    showComparison(avg);
                    tourneyScores = [];
                    updateProgress();
                } else {
                    setPadState('result', '⏱️', `${reactionTime} ms`, `Round ${tourneyScores.length}/5 done. Click to continue!`, 'status-result');
                }
            }
        }

        function showResult(time, subtext) {
            setPadState('result', '⏱️', `${time} ms`, subtext, 'status-result');
            showComparison(time);
        }

        function showComparison(time) {
            if (lastScore !== null) {
                const diff = time - lastScore;
                let msg, color;
                if (diff < 0) { msg = `🚀 ${Math.abs(diff)}ms FASTER than last!`; color = '#1dd1a1'; }
                else if (diff > 0) { msg = `🐢 ${diff}ms slower than last`; color = '#ff6b6b'; }
                else { msg = `🎯 Exact same time!`; color = '#feca57'; }
                padComparison.innerText = msg;
                padComparison.style.color = color;
                padComparison.style.display = 'inline-block';
            }
            lastScore = time;
        }

        // --- Particles ---
        function spawnParticles() {
            const colors = ['#1dd1a1', '#48dbfb', '#feca57', '#ff6b6b', '#5f27cd'];
            const rect = pad.getBoundingClientRect();
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = (rect.width / 2) + 'px';
                p.style.top = (rect.height / 2) + 'px';
                const angle = Math.random() * Math.PI * 2;
                const dist = 100 + Math.random() * 200;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                pad.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        // --- 🔑 FIXED Save Logic ---
        function finishRound(finalTime) {
            updateRank(finalTime);
            streak++;
            updateStreakUI();
            
            recentScores.unshift(finalTime);
            if (recentScores.length > 8) recentScores.pop();
            updateHistoryUI();

            // Re-read latest scores RIGHT before saving (avoid stale data clobbering other games)
            let latestScores = JSON.parse(localStorage.getItem('arcadeScores')) || {};
            
            // Get current best, treating undefined/null as 9999 (the "no record" default)
            const currentBest = (latestScores.reaction === undefined || latestScores.reaction === null) 
                                ? 9999 
                                : latestScores.reaction;
            
            // Save if it's a new record (lower time = better)
            if (finalTime < currentBest) {
                latestScores.reaction = finalTime;
                localStorage.setItem('arcadeScores', JSON.stringify(latestScores));
                bestTimeDisplay.innerText = finalTime + ' ms';
                bestTimeDisplay.style.animation = 'flashRecord 0.6s ease-in-out 2';
                sndRecord();
                setTimeout(() => bestTimeDisplay.style.animation = '', 1500);
                console.log('✅ New record saved:', finalTime, 'ms');
            } else {
                console.log('ℹ️ Not a new record. Current best:', currentBest, 'ms | This attempt:', finalTime, 'ms');
            }
        }

        function updateStreakUI() {
            document.getElementById('streakValue').innerText = streak;
            document.getElementById('streakFlame').style.display = streak >= 3 ? 'inline' : 'none';
        }

        function updateRank(time) {
            const rankDisplay = document.getElementById('rankDisplay');
            let rank = "", color = "";
            if (time < 180)      { rank = "Alien 👽";        color = "#ff4757"; }
            else if (time < 220) { rank = "Pro Gamer 🎮";    color = "#ff9f43"; }
            else if (time < 280) { rank = "Sharpshooter 🎯"; color = "#1dd1a1"; }
            else if (time < 350) { rank = "Average Joe 🧍";  color = "#48dbfb"; }
            else                 { rank = "Sleepy Sloth 🦥"; color = "#a4b0be"; }
            rankDisplay.innerText = rank;
            rankDisplay.style.color = color;
        }

        function updateHistoryUI() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            const best = Math.min(...recentScores);
            recentScores.forEach((score, index) => {
                const li = document.createElement('li');
                if (score === best) li.classList.add('best');
                const star = score === best ? '⭐ ' : '';
                li.innerHTML = `<span>${star}Attempt ${recentScores.length - index}</span> <strong>${score} ms</strong>`;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
