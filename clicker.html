<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Frenzy - Arcade</title>
    <style>
        /* Theme matched to the Hub */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #100b16, #200f33, #150921); 
            color: #fff; margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; overflow-x: hidden;
            user-select: none;
        }

        /* Navigation Bar */
        header { 
            padding: 15px 30px; background: rgba(0,0,0,0.8); 
            border-bottom: 2px solid #ff9f43; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(255, 159, 67, 0.2); position: relative;
        }
        .back-btn {
            background: transparent; border: 2px solid #ff9f43; color: #ff9f43; padding: 8px 20px;
            border-radius: 20px; text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .back-btn:hover { background: #ff9f43; color: #000; box-shadow: 0 0 10px #ff9f43; }
        
        .header-controls { display: flex; gap: 15px; align-items: center; }
        .sound-btn {
            background: rgba(0,0,0,0.8); border: 2px solid #ff9f43; color: #ff9f43;
            font-size: 1.5em; width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .sound-btn:hover { background: #ff9f43; color: #000; box-shadow: 0 0 15px rgba(255, 159, 67, 0.6); }
        .sound-btn.muted { border-color: #ff4757; color: #ff4757; }
        .sound-btn.muted:hover { background: #ff4757; color: #000; box-shadow: 0 0 15px rgba(255, 71, 87, 0.6); }

        /* Game Layout Split */
        .game-container {
            display: flex; flex: 1; padding: 20px; gap: 20px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box;
        }

        /* Left Side: Click Area */
        .click-area {
            flex: 1; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
            overflow: hidden; min-height: 450px;
        }
        
        .score-display { font-size: 4.5em; font-weight: bold; color: #ff9f43; text-shadow: 0 0 20px rgba(255, 159, 67, 0.5); margin-bottom: 5px; transition: transform 0.1s;}
        .score-display.bump { transform: scale(1.1); color: #fff; text-shadow: 0 0 30px #ff9f43; }
        .cps-display { font-size: 1.2em; color: #a4b0be; margin-bottom: 40px; }

        /* The Neon Orb */
        .click-target {
            width: 220px; height: 220px; border-radius: 50%; 
            background: radial-gradient(circle at 30% 30%, #ffc048, #ff3f34);
            box-shadow: 0 0 50px rgba(255, 63, 52, 0.6), inset -20px -20px 40px rgba(0,0,0,0.4), inset 10px 10px 20px rgba(255,255,255,0.6);
            cursor: pointer; transition: transform 0.05s ease, filter 0.1s; position: relative; z-index: 10;
            -webkit-user-drag: none;
        }
        .click-target:active { transform: scale(0.85); box-shadow: 0 0 80px rgba(255, 255, 255, 0.8); filter: brightness(1.3); }

        /* Floating Text Animation */
        .float-text {
            position: absolute; color: #fff; font-weight: bold; font-size: 1.8em; text-shadow: 0 2px 5px #000;
            pointer-events: none; animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; z-index: 20;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            50% { transform: translateY(-40px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-80px) scale(1); }
        }

        /* Shockwave Ripple Effect */
        .ripple {
            position: absolute; border: 4px solid rgba(255, 159, 67, 0.8); border-radius: 50%;
            pointer-events: none; animation: rippleAnim 0.4s ease-out forwards; z-index: 5;
            transform: translate(-50%, -50%);
        }
        @keyframes rippleAnim {
            0% { width: 0px; height: 0px; opacity: 1; border-width: 10px; }
            100% { width: 250px; height: 250px; opacity: 0; border-width: 1px; }
        }

        /* Right Side: Shop Area */
        .shop-area {
            width: 380px; background: rgba(0,0,0,0.5); border-radius: 20px; padding: 20px;
            border: 1px solid rgba(255, 159, 67, 0.2); display: flex; flex-direction: column;
            max-height: calc(100vh - 120px);
        }
        .shop-area h2 { margin-top: 0; color: #48dbfb; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px;}
        
        .shop-list { flex: 1; overflow-y: auto; padding-right: 10px; }
        .shop-list::-webkit-scrollbar { width: 8px; }
        .shop-list::-webkit-scrollbar-thumb { background: #ff9f43; border-radius: 4px; }

        /* Shop Items */
        .upgrade-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .upgrade-card:hover { background: rgba(255,255,255,0.1); border-color: #ff9f43; transform: translateX(-5px); }
        .upgrade-card:active { transform: scale(0.96); }
        .upgrade-card.disabled { opacity: 0.4; cursor: not-allowed; border-color: transparent; transform: none; filter: grayscale(100%); }
        
        .upg-info h3 { margin: 0 0 4px 0; font-size: 1.1em; color: #fff; }
        .upg-info p { margin: 0; font-size: 0.85em; color: #a4b0be; }
        .upg-cost { font-weight: bold; color: #ff9f43; font-size: 1.1em; margin-top: 4px; }
        .upg-count { font-size: 1.8em; font-weight: bold; color: rgba(72, 219, 251, 0.3); text-align: right; min-width: 40px; }

        /* Responsive Layout for smaller screens */
        @media (max-width: 850px) {
            .game-container { flex-direction: column; height: auto; }
            .shop-area { width: 100%; max-height: 500px; }
            .click-area { padding: 40px 0; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn" onclick="sfx.click()">⬅ Back to Hub</a>
        <h2 style="margin:0; color:#fff;">Clicker Frenzy</h2>
        <div class="header-controls">
            <button id="soundToggleBtn" class="sound-btn" onclick="toggleSound()" title="Toggle Sound">🔊</button>
        </div>
    </header>

    <div class="game-container">
        
        <!-- Left: Clicking Game -->
        <div class="click-area" id="clickArea">
            <div class="score-display" id="scoreDisplay">0</div>
            <div class="cps-display">Per Second: <span id="cpsDisplay" style="color: #48dbfb; font-weight: bold;">0</span></div>
            
            <div class="click-target" id="orb"></div>
        </div>

        <!-- Right: Shop Upgrades (Dynamically Generated) -->
        <div class="shop-area">
            <h2>Neon Shop</h2>
            <div class="shop-list" id="shopList">
                <!-- Injected via JS -->
            </div>
            <div style="margin-top: 15px; font-size: 0.8em; color: #a4b0be; text-align: center;">
                Progress automatically saves to the Arcade Hub!
            </div>
        </div>

    </div>

    <script>
        // --- 🎵 CUSTOM RETRO SOUND ENGINE 🎵 ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let soundEnabled = localStorage.getItem('megaplexSound') !== 'false';

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            localStorage.setItem('megaplexSound', soundEnabled);
            updateSoundIcon();
            if (soundEnabled) { initAudio(); sfx.buy(); }
        }

        function updateSoundIcon() {
            const btn = document.getElementById('soundToggleBtn');
            if (soundEnabled) { btn.innerText = '🔊'; btn.classList.remove('muted'); } 
            else { btn.innerText = '🔇'; btn.classList.add('muted'); }
        }

        updateSoundIcon();
        document.body.addEventListener('click', initAudio, { once: true });

        function playTone(freq, type, duration, vol=0.1, time) {
            if (!soundEnabled || !audioCtx) return;
            let t = time !== undefined ? time : audioCtx.currentTime;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, t);
            gain.gain.setValueAtTime(vol, t);
            gain.gain.setTargetAtTime(0.0001, t + duration, 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + duration + 0.1);
        }

        // Extremely Satisfying Sound Effects for Clicker
        const sfx = {
            click: () => playTone(400, 'square', 0.1, 0.05),
            orb: () => {
                if(!soundEnabled || !audioCtx) return;
                let t = audioCtx.currentTime;
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.type = 'square';
                let startFreq = 800 + (Math.random() * 200); 
                osc.frequency.setValueAtTime(startFreq, t);
                osc.frequency.exponentialRampToValueAtTime(100, t + 0.1); 
                
                gain.gain.setValueAtTime(0.15, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(t); osc.stop(t + 0.1);
            },
            buy: () => { 
                playTone(600, 'square', 0.1, 0.05); 
                setTimeout(()=>playTone(900, 'square', 0.2, 0.05), 100); 
            },
            error: () => { playTone(150, 'sawtooth', 0.2, 0.1); }
        };

        // --- Game State Variables ---
        let score = 0;
        let clickPower = 1;
        let cps = 0; 
        
        let globalScores = JSON.parse(localStorage.getItem('arcadeScores')) || { clicker: 0, reaction: 9999, ttt: 0, math: 0, memory: 999, guesser: 0, snake: 0, platformer: 0 };
        let lifetimeClicks = globalScores.clicker || 0; 

        // --- Expanded Upgrades Database ---
        const upgrades = {
            cursor:  { id: 'cursor', name: "Neon Cursor", desc: "+1 Points per Click", type: "click", power: 1, baseCost: 15, costMult: 1.5, count: 0 },
            plasma:  { id: 'plasma', name: "Plasma Clicker", desc: "+10 Points per Click", type: "click", power: 10, baseCost: 500, costMult: 1.6, count: 0 },
            matter:  { id: 'matter', name: "Dark Matter Mouse", desc: "+100 Points per Click", type: "click", power: 100, baseCost: 7500, costMult: 1.7, count: 0 },
            auto:    { id: 'auto', name: "Auto-Clicker", desc: "+1 Points per Second", type: "idle", power: 1, baseCost: 50, costMult: 1.5, count: 0 },
            reactor: { id: 'reactor', name: "Neon Reactor", desc: "+15 Points per Second", type: "idle", power: 15, baseCost: 1000, costMult: 1.5, count: 0 },
            quantum: { id: 'quantum', name: "Quantum Server", desc: "+150 Points per Second", type: "idle", power: 150, baseCost: 15000, costMult: 1.6, count: 0 },
            ai:      { id: 'ai', name: "AI Overlord", desc: "+1,000 Points per Second", type: "idle", power: 1000, baseCost: 250000, costMult: 1.8, count: 0 }
        };

        // --- Core Clicking Logic ---
        const orb = document.getElementById('orb');
        const clickArea = document.getElementById('clickArea');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const shopList = document.getElementById('shopList');

        orb.addEventListener('mousedown', (e) => {
            sfx.orb(); 
            
            score += clickPower;
            lifetimeClicks += clickPower;
            saveProgress();

            updateUI();
            
            createFloatingText(e.clientX, e.clientY, `+${clickPower}`);
            createRipple(e.clientX, e.clientY);
            
            scoreDisplay.classList.add('bump');
            setTimeout(() => scoreDisplay.classList.remove('bump'), 50);
        });

        function createFloatingText(x, y, text) {
            const floatEl = document.createElement('div');
            floatEl.className = 'float-text';
            floatEl.innerText = text;
            
            const offsetX = (Math.random() - 0.5) * 60;
            const offsetY = (Math.random() - 0.5) * 60;
            
            const rect = clickArea.getBoundingClientRect();
            floatEl.style.left = `${x - rect.left + offsetX}px`;
            floatEl.style.top = `${y - rect.top + offsetY}px`;
            
            if(clickPower >= 100) floatEl.style.color = '#9b59b6'; 
            else if(clickPower >= 10) floatEl.style.color = '#48dbfb'; 
            
            clickArea.appendChild(floatEl);
            setTimeout(() => floatEl.remove(), 800);
        }

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            const rect = clickArea.getBoundingClientRect();
            ripple.style.left = `${x - rect.left}px`;
            ripple.style.top = `${y - rect.top}px`;
            clickArea.appendChild(ripple);
            setTimeout(() => ripple.remove(), 400);
        }

        // --- Dynamic Shop System ---
        function getCost(key) {
            const upg = upgrades[key];
            return Math.floor(upg.baseCost * Math.pow(upg.costMult, upg.count));
        }

        function buildShop() {
            shopList.innerHTML = '';
            for (let key in upgrades) {
                const upg = upgrades[key];
                
                const card = document.createElement('div');
                card.className = 'upgrade-card disabled'; 
                card.id = `card-${key}`;
                card.onclick = () => buyUpgrade(key);
                
                card.innerHTML = `
                    <div class="upg-info">
                        <h3>${upg.name}</h3>
                        <p>${upg.desc}</p>
                        <div class="upg-cost">Cost: <span id="cost-${key}">0</span></div>
                    </div>
                    <div class="upg-count" id="count-${key}">0</div>
                `;
                
                shopList.appendChild(card);
            }
            updateUI(); 
        }

        function buyUpgrade(key) {
            const cost = getCost(key);
            if (score >= cost) {
                sfx.buy();
                score -= cost;
                upgrades[key].count++;
                
                recalculateStats();
                updateUI();
            } else {
                sfx.error();
            }
        }

        function recalculateStats() {
            clickPower = 1 + (upgrades.cursor.count * upgrades.cursor.power) 
                           + (upgrades.plasma.count * upgrades.plasma.power) 
                           + (upgrades.matter.count * upgrades.matter.power);
                           
            cps = (upgrades.auto.count * upgrades.auto.power) 
                + (upgrades.reactor.count * upgrades.reactor.power)
                + (upgrades.quantum.count * upgrades.quantum.power)
                + (upgrades.ai.count * upgrades.ai.power);
        }

        // --- Game Loop (Idle Mechanics) ---
        setInterval(() => {
            if (cps > 0) {
                score += cps;
                lifetimeClicks += cps;
                saveProgress();
                updateUI();
            }
        }, 1000); 

        function saveProgress() {
            globalScores.clicker = lifetimeClicks;
            localStorage.setItem('arcadeScores', JSON.stringify(globalScores));
        }

        // --- UI Updates ---
        function updateUI() {
            scoreDisplay.innerText = Math.floor(score).toLocaleString();
            document.getElementById('cpsDisplay').innerText = cps.toLocaleString();

            for (let key in upgrades) {
                const cost = getCost(key);
                const card = document.getElementById(`card-${key}`);
                const costEl = document.getElementById(`cost-${key}`);
                const countEl = document.getElementById(`count-${key}`);
                
                costEl.innerText = cost.toLocaleString();
                countEl.innerText = upgrades[key].count;

                if (score < cost) {
                    card.classList.add('disabled');
                    costEl.style.color = '#ff4757'; 
                } else {
                    card.classList.remove('disabled');
                    costEl.style.color = '#2ecc71'; 
                }
            }
        }

        // Boot Sequence
        buildShop();
        recalculateStats();
        updateUI();

    </script>
</body>
</html>
