<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background matching your body's linear-gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    
    <!-- Neon Glow Effects -->
    <filter id="neonCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Icon Shape -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" stroke="#00d2d3" stroke-width="8"/>
  
  <!-- Outer Neon Ring (Trophy Room Pink) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#f368e0" stroke-width="12" filter="url(#neonPink)"/>
  
  <!-- Central Stylized "M" for Megaplex (Neon Cyan) -->
  <path d="M 160 280 L 160 180 L 256 250 L 352 180 L 352 280" 
        fill="none" 
        stroke="#00d2d3" 
        stroke-width="32" 
        stroke-linejoin="round" 
        stroke-linecap="round" 
        filter="url(#neonCyan)"/>
  
  <!-- Inner White Core for the "M" to make it pop -->
  <path d="M 160 280 L 160 180 L 256 250 L 352 180 L 352 280" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="12" 
        stroke-linejoin="round" 
        stroke-linecap="round"/>

  <!-- Arcade Gamepad Base (Dark Hub Profile Color) -->
  <rect x="146" y="320" width="220" height="70" rx="35" fill="#2f3640" stroke="#feca57" stroke-width="4" filter="url(#neonCyan)"/>
  
  <!-- D-Pad (Neon Purge Red) -->
  <path d="M 186 345 L 206 345 L 206 335 L 216 335 L 216 345 L 236 345 L 236 355 L 216 355 L 216 365 L 206 365 L 206 355 L 186 355 Z" fill="#ff4757" />

  <!-- Action Buttons -->
  <circle cx="296" cy="350" r="12" fill="#1dd1a1" /> <!-- Green -->
  <circle cx="336" cy="350" r="12" fill="#feca57" /> <!-- Gold -->
</svg>
