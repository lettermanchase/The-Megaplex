<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Shop | The Megaplex</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff; margin: 0; padding: 0; min-height: 100vh;
            overflow-x: hidden;
        }
        body.light-mode {
            background: linear-gradient(135deg, #f5f6fa, #c8d6e5, #feca57);
            color: #222;
        }

        /* Starfield */
        .starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle linear infinite; }
        @keyframes twinkle { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
        body.light-mode .star { background: #feca57; }

        /* CRT */
        .crt-overlay {
            pointer-events: none; position: fixed; inset: 0; z-index: 100; opacity: 0.6;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%;
            animation: flicker 0.15s infinite;
        }
        @keyframes flicker { 0%,100% { opacity: 0.55; } 50% { opacity: 0.65; } }

        /* Header */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.7); padding: 20px 32px;
            border-bottom: 3px solid #00d2d3; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: sticky; top: 0; z-index: 50;
            backdrop-filter: blur(10px); gap: 20px; flex-wrap: wrap;
        }
        body.light-mode .header { background: rgba(255,255,255,0.85) !important; color: #222 !important; }
        .megaplex-logo {
            font-family: 'Orbitron', sans-serif; font-size: 2em; color: #00d2d3;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00d2d3, 0 0 20px #00d2d3, 0 0 40px #00d2d3;
            animation: neon-flicker 2.5s infinite alternate; user-select: none;
        }
        body.light-mode .megaplex-logo { color: #00d2d3; text-shadow: 0 0 10px #feca57, 0 0 20px #feca57; }
        @keyframes neon-flicker { 0%,100% { opacity: 1; } 30% { opacity: 0.7; } 50% { opacity: 0.9; } 70% { opacity: 0.85; } }
        .back-btn {
            background: #00d2d3; color: #000; border-radius: 18px;
            font-weight: bold; font-size: 1em; padding: 10px 22px;
            text-decoration: none; box-shadow: 0 0 10px #00d2d3a0;
            border: none; transition: 0.2s;
        }
        .back-btn:hover { background: #feca57; }
        .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .token-display {
            background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; border: 2px solid #feca57;
            font-size: 1.2em; font-weight: bold; color: #feca57; box-shadow: 0 0 15px rgba(254, 202, 87, 0.4);
            transition: transform 0.2s;
        }
        .token-display.pop { animation: tokenPop 0.5s; }
        @keyframes tokenPop { 0%,100%{transform:scale(1);} 50%{transform:scale(1.2);} }
        .level-display {
            background: linear-gradient(135deg, #feca57, #ff9f43); color: #000;
            padding: 8px 16px; border-radius: 18px; font-weight: bold;
            box-shadow: 0 0 10px rgba(254, 202, 87, 0.5);
        }

        /* Toast */
        #toastContainer { position: fixed; top: 90px; right: 20px; z-index: 9000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: rgba(0,0,0,0.95); color: #fff;
            border-left: 4px solid #00d2d3; padding: 15px 25px; border-radius: 8px; min-width: 250px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            animation: slideIn 0.4s ease, fadeOut 0.4s ease 3.6s forwards;
            display: flex; align-items: center; gap: 12px;
        }
        .toast.success { border-color: #1dd1a1; }
        .toast.error { border-color: #ff4757; }
        .toast.warning { border-color: #feca57; }
        .toast.legendary { border-color: #ff9f43; box-shadow: 0 0 30px rgba(255, 159, 67, 0.6); }
        .toast.mythic { border-color: #f368e0; box-shadow: 0 0 30px rgba(243, 104, 224, 0.6); }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(120%); } }

        /* ====== MAIN LAYOUT ====== */
        .main-content {
            max-width: 1400px; margin: 0 auto; padding: 30px 20px 60px;
            display: grid; grid-template-columns: 380px 1fr; gap: 30px;
            position: relative; z-index: 10;
        }
        @media (max-width: 1100px) {
            .main-content { grid-template-columns: 1fr; }
        }

        /* ====== AVATAR PREVIEW ====== */
        .avatar-preview-panel {
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0, 210, 211, 0.05));
            border-radius: 18px; box-shadow: 0 0 30px rgba(0, 210, 211, 0.3);
            padding: 28px 24px; display: flex; flex-direction: column; align-items: center;
            border: 1px solid rgba(0, 210, 211, 0.3);
            position: sticky; top: 100px; height: fit-content;
        }
        body.light-mode .avatar-preview-panel { background: rgba(255,255,255,0.85) !important; color: #222 !important; }
        .avatar-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4em; font-weight: bold; color: #feca57;
            margin-bottom: 5px; text-shadow: 0 0 10px rgba(254, 202, 87, 0.5);
            letter-spacing: 2px; text-align: center;
        }
        .avatar-username { color: #00d2d3; font-weight: bold; margin-bottom: 15px; font-size: 0.95em; letter-spacing: 1px; }
        .avatar-stage {
            width: 280px; height: 280px; border-radius: 20px; border: 4px solid #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
            background: #2f3640; overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 18px; transition: background 0.3s;
        }
        .avatar-stage::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), transparent 50%);
            pointer-events: none; z-index: 4;
        }
        .bot-head {
            width: 110px; height: 90px; background: #c8d6e5; border-radius: 15px;
            position: relative; display: flex; justify-content: center; align-items: center; z-index: 2;
            transition: background 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .bot-eyes {
            width: 70px; height: 32px; background: #000; border-radius: 5px;
            display: flex; justify-content: space-around; align-items: center; padding: 0 5px;
        }
        .eye { width: 17px; height: 17px; background: #00d2d3; border-radius: 50%; box-shadow: 0 0 10px #00d2d3; animation: eyeBlink 4s infinite; }
        @keyframes eyeBlink { 0%,95%,100% { transform: scaleY(1); } 97% { transform: scaleY(0.1); } }
        .bot-body {
            width: 90px; height: 80px; background: #a4b0be; border-radius: 10px;
            margin-top: 5px; position: relative; z-index: 1; transition: background 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .bot-hat { position: absolute; top: -50px; left: 50%; transform: translateX(-50%); font-size: 4em; z-index: 3; line-height: 1; }
        .preview-info {
            margin-top: 12px; color: #c8d6e5; font-size: 0.9em; text-align: center;
            background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px;
            border: 1px solid rgba(0, 210, 211, 0.2); width: 100%;
        }
        .equipped-list {
            display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
            margin-top: 10px; font-size: 0.85em;
        }
        .equipped-row { display: flex; justify-content: space-between; gap: 8px; padding: 4px 8px; background: rgba(0,0,0,0.4); border-radius: 6px; }
        .equipped-row strong { color: #feca57; }
        .preview-actions { display: flex; gap: 8px; margin-top: 12px; width: 100%; }
        .preview-btn {
            flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #ff4757;
            background: rgba(255, 71, 87, 0.1); color: #ff4757;
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.85em;
        }
        .preview-btn:hover { background: #ff4757; color: #fff; }
        .preview-btn.random { border-color: #f368e0; background: rgba(243, 104, 224, 0.1); color: #f368e0; }
        .preview-btn.random:hover { background: #f368e0; color: #000; }

        /* ====== SHOP MAIN ====== */
        .shop-main { display: flex; flex-direction: column; gap: 20px; }

        /* Featured Daily */
        .featured-deal {
            background: linear-gradient(135deg, rgba(243, 104, 224, 0.15), rgba(0,0,0,0.6));
            border: 2px solid #f368e0; border-radius: 16px; padding: 20px;
            display: flex; align-items: center; gap: 20px; position: relative; overflow: hidden;
            box-shadow: 0 0 25px rgba(243, 104, 224, 0.3);
        }
        .featured-deal::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, rgba(243, 104, 224, 0.2), transparent 40%);
            animation: rotate 6s linear infinite;
        }
        @keyframes rotate { to { transform: rotate(360deg); } }
        .featured-deal > * { position: relative; z-index: 1; }
        .featured-badge {
            position: absolute; top: 10px; right: 10px;
            background: #f368e0; color: #fff; padding: 4px 12px;
            border-radius: 10px; font-size: 0.75em; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(243, 104, 224, 0.6); z-index: 2;
        }
        .featured-icon {
            width: 80px; height: 80px; border-radius: 14px;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5em; flex-shrink: 0;
            border: 2px solid #f368e0;
        }
        .featured-info { flex: 1; }
        .featured-info h3 { margin: 0 0 4px; color: #f368e0; font-family: 'Orbitron', sans-serif; }
        .featured-info p { margin: 0 0 10px; color: #ccc; font-size: 0.9em; }
        .featured-prices { display: flex; align-items: center; gap: 10px; }
        .price-old { color: #888; text-decoration: line-through; font-size: 0.95em; }
        .price-new { color: #1dd1a1; font-weight: bold; font-size: 1.2em; font-family: monospace; }
        .featured-buy {
            background: linear-gradient(135deg, #f368e0, #ff9ff3); color: #000;
            border: none; padding: 10px 20px; border-radius: 10px;
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.95em;
        }
        .featured-buy:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(243, 104, 224, 0.6); }
        .featured-buy:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Mystery Box */
        .mystery-box {
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.15), rgba(0,0,0,0.6));
            border: 2px solid #9b59b6; border-radius: 16px; padding: 18px;
            display: flex; align-items: center; gap: 18px;
            box-shadow: 0 0 20px rgba(155, 89, 182, 0.3);
        }
        .mystery-icon { font-size: 3em; animation: mysteryFloat 2s infinite ease-in-out; }
        @keyframes mysteryFloat { 0%,100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-8px) rotate(5deg); } }
        .mystery-info { flex: 1; }
        .mystery-info h3 { margin: 0 0 4px; color: #c39bd3; font-family: 'Orbitron', sans-serif; }
        .mystery-info p { margin: 0; color: #aaa; font-size: 0.85em; }
        .mystery-buy {
            background: linear-gradient(135deg, #9b59b6, #8e44ad); color: #fff;
            border: none; padding: 12px 24px; border-radius: 10px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .mystery-buy:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(155, 89, 182, 0.6); }
        .mystery-buy:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Shop tabs/filters */
        .shop-controls {
            background: rgba(0,0,0,0.6); border-radius: 14px; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
            border: 1px solid rgba(0, 210, 211, 0.2);
        }
        .shop-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .shop-tab {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 8px 16px; border-radius: 20px;
            cursor: pointer; transition: 0.2s; font-size: 0.9em; font-weight: bold;
        }
        .shop-tab:hover { background: rgba(255,255,255,0.15); }
        .shop-tab.active { background: #00d2d3; color: #000; border-color: #00d2d3; box-shadow: 0 0 10px #00d2d3; }
        .shop-filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .shop-search {
            flex: 1; min-width: 150px; padding: 8px 14px; border-radius: 8px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 210, 211, 0.3);
            color: #fff; font-size: 0.9em; outline: none;
        }
        .shop-search:focus { border-color: #00d2d3; }
        .shop-select {
            padding: 8px 12px; border-radius: 8px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(0, 210, 211, 0.3);
            color: #fff; cursor: pointer; font-size: 0.9em;
        }

        /* Category section */
        .category-section { margin-top: 5px; }
        .category-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2em; color: #00d2d3; font-weight: bold;
            margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 2px solid rgba(0, 210, 211, 0.3);
            display: flex; justify-content: space-between; align-items: center;
            letter-spacing: 2px;
        }
        .category-count { font-size: 0.7em; color: #888; letter-spacing: 1px; }

        /* ====== ITEM CARD ====== */
        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
        }
        .item-card {
            background: rgba(20, 20, 30, 0.85);
            border: 2px solid; border-radius: 14px;
            padding: 12px 10px; text-align: center;
            position: relative; overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            display: flex; flex-direction: column; gap: 8px;
            min-height: 220px;
        }
        body.light-mode .item-card { background: rgba(255,255,255,0.9); color: #222; }
        .item-card:hover { transform: translateY(-4px); }

        /* Rarity */
        .item-card.r-common { border-color: #95a5a6; box-shadow: 0 0 10px rgba(149, 165, 166, 0.2); }
        .item-card.r-common:hover { box-shadow: 0 6px 20px rgba(149, 165, 166, 0.5); }
        .item-card.r-uncommon { border-color: #1dd1a1; box-shadow: 0 0 10px rgba(29, 209, 161, 0.3); }
        .item-card.r-uncommon:hover { box-shadow: 0 6px 20px rgba(29, 209, 161, 0.6); }
        .item-card.r-rare { border-color: #3498db; box-shadow: 0 0 12px rgba(52, 152, 219, 0.4); }
        .item-card.r-rare:hover { box-shadow: 0 6px 25px rgba(52, 152, 219, 0.7); }
        .item-card.r-epic { border-color: #9b59b6; box-shadow: 0 0 15px rgba(155, 89, 182, 0.5); }
        .item-card.r-epic:hover { box-shadow: 0 6px 28px rgba(155, 89, 182, 0.8); }
        .item-card.r-legendary {
            border-color: #ff9f43; box-shadow: 0 0 18px rgba(255, 159, 67, 0.5);
            animation: legendGlow 2s infinite alternate;
        }
        @keyframes legendGlow { from { box-shadow: 0 0 15px rgba(255, 159, 67, 0.4); } to { box-shadow: 0 0 30px rgba(255, 159, 67, 0.8); } }
        .item-card.r-mythic {
            border: 2px solid transparent;
            background-clip: padding-box, border-box;
            background-origin: padding-box, border-box;
            background-image: linear-gradient(rgba(20,20,30,0.9), rgba(20,20,30,0.9)), 
                              linear-gradient(135deg, #f368e0, #feca57, #00d2d3, #f368e0);
            animation: mythicShift 3s linear infinite;
            box-shadow: 0 0 20px rgba(243, 104, 224, 0.5);
        }
        @keyframes mythicShift { to { filter: hue-rotate(360deg); } }

        /* Item preview */
        .item-preview {
            width: 80px; height: 80px; margin: 0 auto;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5em;
            background: rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .item-preview.color-preview { font-size: 0; }
        .item-preview.color-preview::after {
            content: ''; position: absolute; inset: 10px;
            border-radius: 6px;
        }
        .item-preview.bg-preview { font-size: 0; }

        /* Rarity badge */
        .rarity-badge {
            position: absolute; top: 6px; left: 6px;
            font-size: 0.6em; padding: 2px 7px; border-radius: 8px;
            font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            z-index: 3;
        }
        .rarity-badge.r-common { background: #95a5a6; color: #000; }
        .rarity-badge.r-uncommon { background: #1dd1a1; color: #000; }
        .rarity-badge.r-rare { background: #3498db; color: #fff; }
        .rarity-badge.r-epic { background: #9b59b6; color: #fff; }
        .rarity-badge.r-legendary { background: linear-gradient(135deg, #ff9f43, #feca57); color: #000; }
        .rarity-badge.r-mythic { background: linear-gradient(135deg, #f368e0, #feca57, #00d2d3); color: #000; }

        /* New / Owned indicators */
        .item-flag {
            position: absolute; top: 6px; right: 6px;
            font-size: 0.6em; padding: 2px 7px; border-radius: 8px;
            font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            z-index: 3;
        }
        .item-flag.new { background: #ff4757; color: #fff; animation: newPulse 1.5s infinite; }
        .item-flag.equipped { background: #00d2d3; color: #000; }
        .item-flag.owned { background: #1dd1a1; color: #000; }
        @keyframes newPulse { 0%,100% { box-shadow: 0 0 5px #ff4757; } 50% { box-shadow: 0 0 15px #ff4757; } }

        .item-name {
            font-weight: bold; font-size: 0.95em;
            color: #fff; margin: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        body.light-mode .item-name { color: #222; }
        .item-lore {
            font-size: 0.7em; color: #888; font-style: italic;
            min-height: 26px; line-height: 1.2;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Action button */
        .item-action {
            margin-top: auto; padding: 7px;
            border-radius: 8px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            font-size: 0.85em;
        }
        .item-action.buy { background: #feca57; color: #000; }
        .item-action.buy:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(254, 202, 87, 0.6); }
        .item-action.buy:disabled { background: #555; color: #888; cursor: not-allowed; transform: none; box-shadow: none; }
        .item-action.equip { background: rgba(0, 210, 211, 0.2); color: #00d2d3; border: 1px solid #00d2d3; }
        .item-action.equip:hover { background: #00d2d3; color: #000; }
        .item-action.equipped { background: rgba(0, 210, 211, 0.1); color: #00d2d3; border: 1px solid #00d2d3; cursor: default; }
        .item-action.locked { background: #333; color: #888; cursor: not-allowed; }
        .item-action.unlock-ach { background: linear-gradient(135deg, #f368e0, #ff9ff3); color: #000; cursor: not-allowed; font-size: 0.75em; }

        /* Locked overlay */
        .item-card.locked .item-preview { filter: grayscale(80%) brightness(0.4); }
        .item-card.locked .item-name { color: #777; }
        .lock-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.65);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2; gap: 6px; pointer-events: none; padding: 10px;
        }
        .lock-icon { font-size: 2.5em; opacity: 0.7; }
        .lock-text { color: #ff9f43; font-weight: bold; font-size: 0.85em; text-align: center; text-shadow: 0 0 8px rgba(255, 159, 67, 0.6); }

        /* Price */
        .item-price {
            display: flex; align-items: center; justify-content: center; gap: 4px;
            color: #feca57; font-weight: bold; font-size: 0.95em;
            background: rgba(254, 202, 87, 0.1); padding: 4px 8px;
            border-radius: 6px; border: 1px solid rgba(254, 202, 87, 0.3);
        }
        .item-price.cant-afford { color: #ff4757; border-color: rgba(255, 71, 87, 0.3); background: rgba(255, 71, 87, 0.1); }

        /* ====== MODAL ====== */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            z-index: 8000; backdrop-filter: blur(8px);
        }
        .modal-overlay.show { display: flex; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: linear-gradient(135deg, #1a1a2e, #0f2027);
            border: 2px solid #00d2d3; border-radius: 16px;
            padding: 30px; max-width: 480px; width: 90%;
            box-shadow: 0 0 40px rgba(0, 210, 211, 0.4);
            position: relative; text-align: center;
        }
        .modal h2 { margin: 0 0 10px; color: #00d2d3; font-family: 'Orbitron', sans-serif; }
        .modal-item-preview {

                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = Math.random() * 3 + 's';
                sf.appendChild(star);
            }
        }
        generateStars();

        /* ================= AUDIO (matched to hub) ================= */
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let soundEnabled = localStorage.getItem('megaplexSound') !== 'false';
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        document.body.addEventListener('click', initAudio, { once: true });
        function playTone(freq, type, duration, vol=0.1) {
            if (!soundEnabled) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        const sfx = {
            hover: () => playTone(800, 'sine', 0.05, 0.02),
            click: () => playTone(400, 'square', 0.1, 0.05),

            error: () => { playTone(200, 'sawtooth', 0.2, 0.06); },

        /* ================= INVENTORY ================= */
        function getInventory() {
            let inv = JSON.parse(localStorage.getItem('avatarInventory'));
            if (!inv) {
                // Auto-grant default items
                inv = { colors: [], hats: [], bgs: [] };
                shopDatabase.colors.filter(i => i.defaultItem).forEach(i => inv.colors.push(i.id));
                shopDatabase.hats.filter(i => i.defaultItem).forEach(i => inv.hats.push(i.id));
                shopDatabase.bgs.filter(i => i.defaultItem).forEach(i => inv.bgs.push(i.id));
                localStorage.setItem('avatarInventory', JSON.stringify(inv));
            }
            // Ensure default items always present
            ['colors','hats','bgs'].forEach(cat => {
                shopDatabase[cat].filter(i => i.defaultItem).forEach(i => {
                    if (!inv[cat].includes(i.id)) inv[cat].push(i.id);
                });
            });
            return inv;
        }
        function saveInventory(inv) { localStorage.setItem('avatarInventory', JSON.stringify(inv)); }

        function getAvatarData() {
            let avatarData = JSON.parse(localStorage.getItem('avatarData'));
            if (!avatarData || !avatarData.equipped) {
                avatarData = { equipped: { color: 'color_default', hat: 'hat_none', bg: 'bg_default' } };
            }
            return avatarData;

            document.getElementById('avatarBotBody').style.background = c.bodyHex;

            const ownedBgs = shopDatabase.bgs.filter(b => inv.bgs.includes(b.id));
            a.equipped.color = ownedColors[Math.floor(Math.random()*ownedColors.length)].id;
            a.equipped.hat = ownedHats[Math.floor(Math.random()*ownedHats.length)].id;
            a.equipped.bg = ownedBgs[Math.floor(Math.random()*ownedBgs.length)].id;
            saveAvatarData(a);
            renderAvatar();
            renderShop();
            toast('Random loadout applied!', 'success', '🎲');
        }
        function resetAvatar() {
            sfx.click();
            const a = getAvatarData();
            a.equipped = { color: 'color_default', hat: 'hat_none', bg: 'bg_default' };
            saveAvatarData(a);
            renderAvatar();
            renderShop();
            toast('Reset to defaults', 'info', '↺');
        }

        /* ================= SHOP RENDERING ================= */
        const RARITY_ORDER = { common:1, uncommon:2, rare:3, epic:4, legendary:5, mythic:6 };
        const RARITY_LABEL = { common:'COMMON', uncommon:'UNCOMMON', rare:'RARE', epic:'EPIC', legendary:'LEGENDARY', mythic:'MYTHIC' };
        let activeTab = 'all';
        let seenItems = JSON.parse(localStorage.getItem('avatarSeenItems')) || [];

        function setTab(tab, btn) {
            activeTab = tab;
            document.querySelectorAll('.shop-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            sfx.click();
            renderShop();
        }

        function getAllItems() {
            return [
                ...shopDatabase.colors.map(i => ({...i, type:'color'})),
                ...shopDatabase.hats.map(i => ({...i, type:'hat'})),
                ...shopDatabase.bgs.map(i => ({...i, type:'bg'}))
            ];
        }

        function getItemPreviewHTML(item) {
            if (item.type === 'color') {
                return `<div class="item-preview color-preview" style="background:${item.bodyHex};"><div style="position:absolute; inset:8px; background:${item.hex}; border-radius:6px;"></div></div>`;
            } else if (item.type === 'hat') {
                return `<div class="item-preview">${item.icon || '∅'}</div>`;
            } else {
                return `<div class="item-preview bg-preview" style="background:${item.css};"></div>`;
            }
        }

        function isOwned(item) {
            const inv = getInventory();
            const cat = item.type === 'color' ? 'colors' : item.type === 'hat' ? 'hats' : 'bgs';
            return inv[cat].includes(item.id);
        }
        function isEquipped(item) {
            const a = getAvatarData();
            return a.equipped[item.type] === item.id;
        }
        function isAchClaimed(achId) {
            const claimed = JSON.parse(localStorage.getItem('claimedAchievements')) || [];
            return claimed.includes(achId);
        }

        function renderShop() {
            const container = document.getElementById('shopContainer');
            const search = document.getElementById('shopSearch').value.toLowerCase();
            const rarityFilter = document.getElementById('rarityFilter').value;
            const sort = document.getElementById('sortFilter').value;

            let items = getAllItems();
            if (activeTab === 'colors') items = items.filter(i => i.type === 'color');
            else if (activeTab === 'hats') items = items.filter(i => i.type === 'hat');
            else if (activeTab === 'bgs') items = items.filter(i => i.type === 'bg');
            else if (activeTab === 'owned') items = items.filter(i => isOwned(i));

            if (search) items = items.filter(i => i.name.toLowerCase().includes(search) || (i.lore||'').toLowerCase().includes(search));
            if (rarityFilter !== 'all') items = items.filter(i => i.rarity === rarityFilter);

            // Sort
            if (sort === 'rarity') items.sort((a,b) => RARITY_ORDER[a.rarity] - RARITY_ORDER[b.rarity]);
            else if (sort === 'rarity_desc') items.sort((a,b) => RARITY_ORDER[b.rarity] - RARITY_ORDER[a.rarity]);
            else if (sort === 'price_asc') items.sort((a,b) => a.price - b.price);
            else if (sort === 'price_desc') items.sort((a,b) => b.price - a.price);
            else if (sort === 'level') items.sort((a,b) => a.level - b.level);

            if (items.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:60px 20px; color:#666; font-style:italic;">No items match your filters.</div>`;
                return;
            }

            // Group by type when "all"
            let html = '';
            if (activeTab === 'all') {
                const grouped = {color: [], hat: [], bg: []};
                items.forEach(i => grouped[i.type].push(i));
                const titles = { color: '🎨 CHASSIS COLORS', hat: '🎩 HATS & ACCESSORIES', bg: '🖼️ BACKGROUNDS' };
                ['color','hat','bg'].forEach(type => {
                    if (grouped[type].length === 0) return;
                    html += `<div class="category-section">
                        <div class="category-header"><span>${titles[type]}</span><span class="category-count">${grouped[type].length} ITEMS</span></div>
                        <div class="item-grid">${grouped[type].map(renderItemCard).join('')}</div>
                    </div>`;
                });
            } else {
                html = `<div class="category-section"><div class="item-grid">${items.map(renderItemCard).join('')}</div></div>`;
            }
            container.innerHTML = html;

            // Mark all rendered as seen
            items.forEach(i => { if (!seenItems.includes(i.id)) seenItems.push(i.id); });
            localStorage.setItem('avatarSeenItems', JSON.stringify(seenItems));
        }

        function renderItemCard(item) {
            const owned = isOwned(item);
            const equipped = isEquipped(item);
            const tokens = getTokens();
            const lvl = getLevel();
            const meetsLevel = lvl >= item.level;
            const achLocked = item.achReq && !isAchClaimed(item.achReq);
            const isNew = !seenItems.includes(item.id) && !owned;

            let actionHTML = '';
            let lockOverlay = '';
            let cardClass = `item-card r-${item.rarity}`;

            if (achLocked) {
                cardClass += ' locked';
                lockOverlay = `<div class="lock-overlay"><div class="lock-icon">🏆</div><div class="lock-text">Trophy Required</div></div>`;
                actionHTML = `<button class="item-action unlock-ach" disabled>🏆 Achievement Locked</button>`;
            } else if (!meetsLevel && !owned) {
                cardClass += ' locked';
                lockOverlay = `<div class="lock-overlay"><div class="lock-icon">🔒</div><div class="lock-text">Requires Level ${item.level}</div></div>`;
                actionHTML = `<button class="item-action locked" disabled>🔒 Level ${item.level}</button>`;
            } else if (equipped) {
                actionHTML = `<button class="item-action equipped" disabled>✓ Equipped</button>`;
            } else if (owned) {
                actionHTML = `<button class="item-action equip" onmouseenter="sfx.hover()" onclick='equipItem("${item.type}","${item.id}")'>Equip</button>`;
            } else {
                const canAfford = tokens >= item.price;
                const priceClass = canAfford ? '' : 'cant-afford';
                actionHTML = `
                    <div class="item-price ${priceClass}">🎟️ ${item.price.toLocaleString()}</div>
                    <button class="item-action buy" ${canAfford ? '' : 'disabled'} onmouseenter="sfx.hover()" onclick='openConfirm("${item.type}","${item.id}")'>${canAfford ? 'Purchase' : 'Need More 🎟️'}</button>
                `;
            }

            const flag = equipped ? `<span class="item-flag equipped">EQUIPPED</span>`
                       : owned ? `<span class="item-flag owned">OWNED</span>`
                       : isNew ? `<span class="item-flag new">NEW</span>`
                       : '';

            return `
                <div class="${cardClass}">
                    <span class="rarity-badge r-${item.rarity}">${RARITY_LABEL[item.rarity]}</span>
                    ${flag}
                    ${getItemPreviewHTML(item)}
                    ${lockOverlay}
                    <div class="item-name" title="${item.name}">${item.name}</div>
                    <div class="item-lore" title="${item.lore}">${item.lore}</div>
                    ${actionHTML}
                </div>
            `;
        }

        /* ================= EQUIP / BUY ================= */
        function equipItem(type, id) {
            sfx.equip();
            const a = getAvatarData();
            a.equipped[type] = id;
            saveAvatarData(a);
            renderAvatar();
            renderShop();
            const item = getAllItems().find(i => i.id === id && i.type === type);
            toast(`Equipped: ${item.name}`, 'success', '✓');
        }

        let pendingPurchase = null;
        function openConfirm(type, id) {
            const item = getAllItems().find(i => i.id === id && i.type === type);
            if (!item) return;
            sfx.click();
            pendingPurchase = item;
            document.getElementById('confirmPreview').innerHTML = getItemPreviewHTML(item).replace('class="item-preview', 'class="item-preview" style="width:100%; height:100%; font-size:3em;"');
            // Cleaner: rebuild preview content
            if (item.type === 'color') {
                document.getElementById('confirmPreview').innerHTML = `<div style="width:80px; height:80px; border-radius:10px; background:${item.bodyHex}; position:relative;"><div style="position:absolute; inset:10px; background:${item.hex}; border-radius:6px;"></div></div>`;
            } else if (item.type === 'hat') {
                document.getElementById('confirmPreview').innerText = item.icon || '∅';
            } else {
                document.getElementById('confirmPreview').innerHTML = `<div style="width:90px; height:90px; border-radius:10px; background:${item.css};"></div>`;
            }
            document.getElementById('confirmName').innerText = item.name;
            document.getElementById('confirmDesc').innerHTML = `<em>"${item.lore}"</em><br><span style="color:${rarityColor(item.rarity)}; font-weight:bold; margin-top:8px; display:inline-block;">${RARITY_LABEL[item.rarity]}</span>`;
            document.getElementById('confirmPrice').innerText = item.price.toLocaleString();
            document.getElementById('confirmModal').classList.add('show');
        }
        function closeConfirm() {
            document.getElementById('confirmModal').classList.remove('show');
            pendingPurchase = null;
        }
        function rarityColor(r) {
            return { common:'#95a5a6', uncommon:'#1dd1a1', rare:'#3498db', epic:'#9b59b6', legendary:'#ff9f43', mythic:'#f368e0' }[r];
        }
        function confirmPurchase() {
            if (!pendingPurchase) return;
            const item = pendingPurchase;
            const tokens = getTokens();
            if (tokens < item.price) {
                toast('Not enough tokens!', 'error', '❌');
                sfx.error();
                closeConfirm();
                return;
            }
            setTokens(tokens - item.price);
            const inv = getInventory();
            const cat = item.type === 'color' ? 'colors' : item.type === 'hat' ? 'hats' : 'bgs';
            inv[cat].push(item.id);
            saveInventory(inv);
            sfx.buy();
            const isFancy = ['legendary','mythic'].includes(item.rarity);
            toast(`Purchased: ${item.name}!`, isFancy ? item.rarity : 'success', isFancy ? '⭐' : '🛍️');
            // Auto-equip
            const a = getAvatarData();
            a.equipped[item.type] = item.id;
            saveAvatarData(a);
            renderAvatar();
            renderShop();
            closeConfirm();
        }

        /* ================= MYSTERY BOX ================= */
        const MYSTERY_PRICE = 800;
        function buyMysteryBox() {
            const tokens = getTokens();
            if (tokens < MYSTERY_PRICE) {
                toast('Not enough tokens for mystery crate!', 'error', '❌');
                sfx.error();
                return;
            }
            // Pool: any item except mythic and except already owned
            const inv = getInventory();
            const pool = getAllItems().filter(i => 
                i.rarity !== 'mythic' &&
                !i.achReq &&
                !inv[i.type === 'color' ? 'colors' : i.type === 'hat' ? 'hats' : 'bgs'].includes(i.id) &&
                getLevel() >= Math.max(1, i.level - 3) // can roll items up to 3 levels above
            );
            if (pool.length === 0) {
                toast('You already own everything available! Nothing to roll.', 'warning', '🎁');
                return;
            }
            // Weighted by rarity (rarer = less likely)
            const weights = { common: 50, uncommon: 30, rare: 14, epic: 5, legendary: 1 };
            const weighted = [];
            pool.forEach(i => {
                const w = weights[i.rarity] || 1;
                for (let n=0; n<w; n++) weighted.push(i);
            });
            const won = weighted[Math.floor(Math.random() * weighted.length)];
            setTokens(tokens - MYSTERY_PRICE);
            // Add to inventory
            const cat = won.type === 'color' ? 'colors' : won.type === 'hat' ? 'hats' : 'bgs';
            inv[cat].push(won.id);
            saveInventory(inv);
            sfx.mystery();
            // Show reveal
            document.getElementById('revealIcon').style.background = `radial-gradient(circle, ${rarityColor(won.rarity)}55, transparent 70%)`;
            if (won.type === 'color') {
                document.getElementById('revealIcon').innerHTML = `<div style="width:90px; height:90px; border-radius:14px; background:${won.bodyHex}; position:relative;"><div style="position:absolute; inset:12px; background:${won.hex}; border-radius:8px;"></div></div>`;
            } else if (won.type === 'hat') {
                document.getElementById('revealIcon').innerText = won.icon || '∅';
            } else {
                document.getElementById('revealIcon').innerHTML = `<div style="width:120px; height:120px; border-radius:14px; background:${won.css};"></div>`;
            }
            document.getElementById('revealRarity').innerText = RARITY_LABEL[won.rarity];
            document.getElementById('revealRarity').style.color = rarityColor(won.rarity);
            document.getElementById('revealName').innerText = won.name;
            document.getElementById('revealDesc').innerHTML = `<em>"${won.lore}"</em>`;
            document.getElementById('revealModal').classList.add('show');
            renderShop();
        }
        function closeReveal() {
            document.getElementById('revealModal').classList.remove('show');
        }

        /* ================= FEATURED DAILY DEAL ================= */
        function renderFeaturedDeal() {
            // Pick a deterministic item per day
            const day = Math.floor(Date.now() / 86400000);
            const candidates = getAllItems().filter(i => 
                !i.defaultItem && i.price > 0 && i.rarity !== 'mythic' && !i.achReq
            );
            const item = candidates[day % candidates.length];
            const discount = 0.3; // 30% off
            const newPrice = Math.floor(item.price * (1 - discount));
            const tokens = getTokens();
            const lvl = getLevel();
            const meetsLevel = lvl >= item.level;
            const owned = isOwned(item);

            let buyBtn = '';
            if (owned) {
                buyBtn = `<button class="featured-buy" disabled>Already Owned ✓</button>`;
            } else if (!meetsLevel) {
                buyBtn = `<button class="featured-buy" disabled>🔒 Requires LV.${item.level}</button>`;
            } else if (tokens < newPrice) {
                buyBtn = `<button class="featured-buy" disabled>Need More 🎟️</button>`;
            } else {
                buyBtn = `<button class="featured-buy" onclick='buyDailyDeal("${item.type}","${item.id}",${newPrice})'>Snatch It! 💸</button>`;
            }

            const previewHTML = item.type === 'color'
                ? `<div style="width:60px; height:60px; border-radius:8px; background:${item.bodyHex}; position:relative;"><div style="position:absolute; inset:8px; background:${item.hex}; border-radius:4px;"></div></div>`
                : item.type === 'hat' ? item.icon
                : `<div style="width:60px; height:60px; border-radius:8px; background:${item.css};"></div>`;

            document.getElementById('featuredDeal').innerHTML = `
                <span class="featured-badge">⭐ Daily Deal • -30%</span>
                <div class="featured-icon">${previewHTML}</div>
                <div class="featured-info">
                    <h3>${item.name} <span style="font-size:0.7em; color:${rarityColor(item.rarity)};">[${RARITY_LABEL[item.rarity]}]</span></h3>
                    <p><em>"${item.lore}"</em></p>
                    <div class="featured-prices">
                        <span class="price-old">🎟️ ${item.price.toLocaleString()}</span>
                        <span class="price-new">🎟️ ${newPrice.toLocaleString()}</span>
                    </div>
                </div>
                ${buyBtn}
            `;
        }
        function buyDailyDeal(type, id, price) {
            const item = getAllItems().find(i => i.id === id && i.type === type);
            if (!item) return;
            const tokens = getTokens();
            if (tokens < price) { toast('Not enough!', 'error', '❌'); sfx.error(); return; }
            setTokens(tokens - price);
            const inv = getInventory();
            const cat = type === 'color' ? 'colors' : type === 'hat' ? 'hats' : 'bgs';
            inv[cat].push(id);
            saveInventory(inv);
            const a = getAvatarData();
            a.equipped[type] = id;
            saveAvatarData(a);
            sfx.buy();
            toast(`Daily Deal claimed: ${item.name}!`, 'success', '⭐');
            renderAvatar();
            renderShop();
            renderFeaturedDeal();
        }

        function refreshMysteryBtn() {
            const btn = document.getElementById('mysteryBuyBtn');
            const tokens = getTokens();
            if (tokens < MYSTERY_PRICE) {
                btn.disabled = true;
                btn.innerText = `Need 🎟️ ${MYSTERY_PRICE}`;
            } else {
                btn.disabled = false;
                btn.innerText = `Open • 🎟️ ${MYSTERY_PRICE}`;
            }
        }

        /* ================= THEME ================= */
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('megaplexTheme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }
        if(localStorage.getItem('megaplexTheme') === 'light') document.body.classList.add('light-mode');

        /* ================= SHORTCUTS ================= */
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT') {
                if (e.key === 'Escape') e.target.blur();
                return;
            }
            if (e.key === 'Escape') { closeConfirm(); closeReveal(); }
            if (e.key === '/') { e.preventDefault(); document.getElementById('shopSearch').focus(); }
            if (e.key === 'r' || e.key === 'R') randomizeAvatar();
        });

        /* ================= INIT ================= */
        // Hook into setTokens to refresh mystery btn / featured
        const origSetTokens = setTokens;
        setTokens = function(amt) {
            origSetTokens(amt);
            refreshMysteryBtn();
            renderFeaturedDeal();
        };

        renderHeader();
        renderAvatar();
        renderShop();
        renderFeaturedDeal();
        refreshMysteryBtn();
    </script>
</body>
</html>
