<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Asteroids | The Megaplex</title>
    <style>
        /* --- Base Theme & CRT Effect --- */
        body {
            margin: 0; padding: 0; background-color: #050510; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevent scrolling */
        }
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 4px, 6px 100%; pointer-events: none;
            animation: flicker 0.15s infinite; opacity: 0.6;
        }
        @keyframes flicker { 0% { opacity: 0.55; } 50% { opacity: 0.65; } 100% { opacity: 0.55; } }

        /* --- UI Elements --- */
        #gameCanvas {
            display: block; width: 100vw; height: 100vh;
        }
        .ui-layer {
            position: absolute; top: 20px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: flex-start; z-index: 10;
        }
        .hud-text { font-size: 1.5em; font-weight: bold; text-shadow: 0 0 10px #00cec9; color: #00cec9; }
        
        .back-btn {
            background: rgba(0,0,0,0.7); border: 2px solid #ff4757; color: #ff4757;
            padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold;
            transition: 0.3s; text-shadow: 0 0 5px #ff4757; box-shadow: 0 0 10px rgba(255, 71, 87, 0.3);
        }
        .back-btn:hover { background: #ff4757; color: #fff; box-shadow: 0 0 20px #ff4757; text-shadow: none; }

        #gameOverScreen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); border: 2px solid #00cec9; padding: 40px;
            border-radius: 15px; text-align: center; display: none; z-index: 20;
            box-shadow: 0 0 30px rgba(0, 206, 201, 0.5);
        }
        h1 { margin: 0 0 10px 0; font-size: 3em; color: #00cec9; text-shadow: 0 0 15px #00cec9; text-transform: uppercase;}
        .restart-btn {
            background: #00cec9; color: #000; border: none; padding: 15px 30px; font-size: 1.2em;
            font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .restart-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px #00cec9; }
        .controls-hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(255,255,255,0.5); z-index: 5;}
    </style>
</head>
<body>

    <div class="ui-layer">
        <div class="hud-text">
            SCORE: <span id="scoreVal">0</span><br>
            WAVE: <span id="waveVal">1</span><br>
            LIVES: <span id="livesVal">❤️❤️❤️</span>
        </div>
        <a href="index.html" class="back-btn" onclick="saveGameData()">⬅ Return to Hub</a>
    </div>

    <div class="controls-hint">
        [W/Up] Thrust | [A/D or Left/Right] Rotate | [SPACE] Shoot | [SHIFT] Hyperspace (Random Teleport)
    </div>

    <div id="gameOverScreen">
        <h1>SYSTEM FAILURE</h1>
        <p style="font-size: 1.2em; color: #aaa;">Final Score: <span id="finalScore" style="color: #fff; font-weight:bold;"></span></p>
        <p id="highScoreAlert" style="color: #feca57; font-weight: bold; display: none;">🏆 NEW PERSONAL BEST! 🏆</p>
        <button class="restart-btn" onclick="initGame()">REBOOT SYSTEM</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let shakeTime = 0;

        // Game State
        let score = 0;
        let wave = 1;
        let lives = 3;
        let gameOver = false;
        
        // Entities
        let ship;
        let asteroids = [];
        let bullets = [];
        let particles = [];
        let powerups = [];
        let ufo = null;
        let ufoBullets = [];

        // Input tracking
        const keys = { w: false, a: false, d: false, space: false, ArrowUp: false, ArrowLeft: false, ArrowRight: false };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Utility Functions ---
        const random = (min, max) => Math.random() * (max - min) + min;
        const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

        function screenShake(duration) { shakeTime = duration; }

        // --- Classes ---
        class Ship {
            constructor() {
                this.x = width / 2; this.y = height / 2;
                this.r = 15; this.heading = 0;
                this.velX = 0; this.velY = 0;
                this.thrust = false;
                this.cooldown = 0;
                this.invulnerable = 150; // frames
                this.shield = false;
                this.spreadShot = 0; // frames
            }
            update() {
                if (this.invulnerable > 0) this.invulnerable--;
                if (this.spreadShot > 0) this.spreadShot--;
                if (this.cooldown > 0) this.cooldown--;

                // Turning
                if (keys.a || keys.ArrowLeft) this.heading -= 0.1;
                if (keys.d || keys.ArrowRight) this.heading += 0.1;

                // Thrust
                this.thrust = (keys.w || keys.ArrowUp);
                if (this.thrust) {
                    this.velX += Math.cos(this.heading) * 0.15;
                    this.velY += Math.sin(this.heading) * 0.15;
                    // Exhaust particles
                    if (Math.random() > 0.5) {
                        particles.push(new Particle(this.x - Math.cos(this.heading)*this.r, this.y - Math.sin(this.heading)*this.r, -this.velX + random(-1,1), -this.velY + random(-1,1), '#ff9f43'));
                    }
                }

                // Friction
                this.velX *= 0.99; this.velY *= 0.99;
                
                this.x += this.velX; this.y += this.velY;

                // Screen Wrap
                if (this.x < 0) this.x = width; if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height; if (this.y > height) this.y = 0;

                // Shooting
                if (keys.space && this.cooldown <= 0) {
                    this.shoot();
                }
            }
            shoot() {
                this.cooldown = 15;
                bullets.push(new Bullet(this.x + Math.cos(this.heading)*this.r, this.y + Math.sin(this.heading)*this.r, this.heading));
                if (this.spreadShot > 0) {
                    bullets.push(new Bullet(this.x, this.y, this.heading + 0.3));
                    bullets.push(new Bullet(this.x, this.y, this.heading - 0.3));
                }
            }
            draw() {
                if (this.invulnerable > 0 && Math.floor(Date.now() / 100) % 2 === 0) return; // Blinking
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.heading);
                
                // Draw Ship
                ctx.strokeStyle = '#00cec9'; ctx.lineWidth = 2;
                ctx.shadowBlur = 15; ctx.shadowColor = '#00cec9';
                ctx.beginPath();
                ctx.moveTo(this.r, 0);
                ctx.lineTo(-this.r, this.r * 0.6);
                ctx.lineTo(-this.r * 0.5, 0);
                ctx.lineTo(-this.r, -this.r * 0.6);
                ctx.closePath();
                ctx.stroke();

                // Draw Shield
                if (this.shield) {
                    ctx.strokeStyle = '#74b9ff'; ctx.beginPath();
                    ctx.arc(0, 0, this.r + 10, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        class Asteroid {
            constructor(x, y, r, lvl) {
                this.x = x; this.y = y; this.r = r; this.lvl = lvl;
                let speedMult = 1 + (wave * 0.2); // Faster each wave
                this.velX = random(-1.5, 1.5) * speedMult;
                this.velY = random(-1.5, 1.5) * speedMult;
                this.vertices = Math.floor(random(7, 12));
                this.offsets = [];
                for (let i = 0; i < this.vertices; i++) {
                    this.offsets.push(random(this.r * 0.5, this.r * 1.2));
                }
            }
            update() {
                this.x += this.velX; this.y += this.velY;
                if (this.x < -this.r) this.x = width + this.r;
                if (this.x > width + this.r) this.x = -this.r;
                if (this.y < -this.r) this.y = height + this.r;
                if (this.y > height + this.r) this.y = -this.r;
            }
            draw() {
                ctx.strokeStyle = '#fd79a8'; ctx.lineWidth = 2;
                ctx.shadowBlur = 10; ctx.shadowColor = '#fd79a8';
                ctx.beginPath();
                for (let i = 0; i < this.vertices; i++) {
                    let angle = (i / this.vertices) * Math.PI * 2;
                    let _x = this.x + Math.cos(angle) * this.offsets[i];
                    let _y = this.y + Math.sin(angle) * this.offsets[i];
                    if (i === 0) ctx.moveTo(_x, _y); else ctx.lineTo(_x, _y);
                }
                ctx.closePath(); ctx.stroke();
            }
            break() {
                screenShake(10);
                score += (4 - this.lvl) * 100;
                document.getElementById('scoreVal').innerText = score;
                
                // Explode particles
                for(let i=0; i<15; i++) particles.push(new Particle(this.x, this.y, random(-3,3), random(-3,3), '#fd79a8'));

                // Chance to drop powerup
                if (Math.random() < 0.1) powerups.push(new PowerUp(this.x, this.y));

                // Split
                if (this.lvl < 3) {
                    asteroids.push(new Asteroid(this.x, this.y, this.r / 2, this.lvl + 1));
                    asteroids.push(new Asteroid(this.x, this.y, this.r / 2, this.lvl + 1));
                }
            }
        }

        class UFO {
            constructor() {
                this.x = 0; this.y = random(100, height - 100);
                this.r = 18;
                this.velX = 2 + (wave * 0.2);
                this.timer = 0;
            }
            update() {
                this.x += this.velX;
                this.y += Math.sin(this.x * 0.02) * 2; // Wavy motion
                this.timer++;
                if (this.timer > 100 && !gameOver) {
                    this.timer = 0;
                    // Aim at player
                    let angle = Math.atan2(ship.y - this.y, ship.x - this.x);
                    ufoBullets.push(new Bullet(this.x, this.y, angle, true));
                }
            }
            draw() {
                ctx.strokeStyle = '#ff4757'; ctx.lineWidth = 2;
                ctx.shadowBlur = 15; ctx.shadowColor = '#ff4757';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI, true);
                ctx.lineTo(this.x - this.r - 5, this.y + 5);
                ctx.lineTo(this.x + this.r + 5, this.y + 5);
                ctx.closePath(); ctx.stroke();
                ctx.beginPath(); ctx.arc(this.x, this.y-5, this.r*0.6, Math.PI, 0); ctx.stroke();
            }
        }

        class Bullet {
            constructor(x, y, angle, isEnemy = false) {
                this.x = x; this.y = y; this.isEnemy = isEnemy;
                let speed = 10;
                this.velX = Math.cos(angle) * speed;
                this.velY = Math.sin(angle) * speed;
                this.life = 60;
            }
            update() { this.x += this.velX; this.y += this.velY; this.life--; }
            draw() {
                ctx.fillStyle = this.isEnemy ? '#ff4757' : (ship.spreadShot > 0 ? '#a55eea' : '#00cec9');
                ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.color = color; this.life = random(20, 40);
            }
            update() { this.x += this.vx; this.y += this.vy; this.life--; }
            draw() {
                ctx.fillStyle = this.color; ctx.globalAlpha = this.life / 40;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class PowerUp {
            constructor(x, y) {
                this.x = x; this.y = y; this.life = 400;
                this.type = Math.random() > 0.5 ? 'shield' : 'spread';
                this.color = this.type === 'shield' ? '#74b9ff' : '#a55eea';
            }
            update() { this.life--; }
            draw() {
                ctx.strokeStyle = this.color; ctx.lineWidth = 2; ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 10 + Math.sin(this.life*0.1)*3, 0, Math.PI*2); ctx.stroke();
            }
        }

        // --- Controls ---
        window.addEventListener('keydown', e => { 
            if (keys.hasOwnProperty(e.key) || e.key === ' ') {
                if (e.key === ' ') keys.space = true;
                else keys[e.key] = true;
            }
            // Hyperspace
            if (e.key === 'Shift' && !gameOver && ship.invulnerable <= 0) {
                ship.x = random(50, width-50);
                ship.y = random(50, height-50);
                ship.velX = 0; ship.velY = 0;
                screenShake(15);
                for(let i=0;i<20;i++) particles.push(new Particle(ship.x, ship.y, random(-5,5), random(-5,5), '#00cec9'));
            }
        });
        window.addEventListener('keyup', e => {
            if (keys.hasOwnProperty(e.key) || e.key === ' ') {
                if (e.key === ' ') keys.space = false;
                else keys[e.key] = false;
            }
        });

        // --- Core Loop ---
        function spawnAsteroids(count) {
            for (let i = 0; i < count; i++) {
                let ax, ay;
                do {
                    ax = random(0, width); ay = random(0, height);
                } while (dist(ax, ay, ship.x, ship.y) < 150); // Keep away from player
                asteroids.push(new Asteroid(ax, ay, random(30, 50), 1));
            }
        }

        function initGame() {
            ship = new Ship();
            asteroids = []; bullets = []; particles = []; powerups = []; ufoBullets = [];
            ufo = null; score = 0; wave = 1; lives = 3; gameOver = false;
            
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('waveVal').innerText = wave;
            updateLivesUI();
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('highScoreAlert').style.display = 'none';
            
            spawnAsteroids(4);
            gameLoop();
        }

        function updateLivesUI() {
            let str = ''; for(let i=0; i<lives; i++) str += '❤️';
            document.getElementById('livesVal').innerText = str || '☠️';
        }

        function triggerGameOver() {
            gameOver = true;
            document.getElementById('gameOverScreen').style.display = 'block';
            document.getElementById('finalScore').innerText = score;
            saveGameData();
        }

        function saveGameData() {
            let scores = JSON.parse(localStorage.getItem('arcadeScores')) || {};
            let previousHigh = scores.asteroids || 0;
            
            if (score > previousHigh) {
                scores.asteroids = score;
                localStorage.setItem('arcadeScores', JSON.stringify(scores));
                if (gameOver) document.getElementById('highScoreAlert').style.display = 'block';
            }
        }

        function gameLoop() {
            if (gameOver) return;
            requestAnimationFrame(gameLoop);

            ctx.clearRect(0, 0, width, height);

            // Screen Shake logic
            if (shakeTime > 0) {
                ctx.save();
                let dx = random(-5, 5); let dy = random(-5, 5);
                ctx.translate(dx, dy);
                shakeTime--;
            }

            // Next Wave
            if (asteroids.length === 0) {
                wave++;
                document.getElementById('waveVal').innerText = wave;
                spawnAsteroids(4 + wave);
            }

            // Spawn UFO
            if (!ufo && wave >= 2 && Math.random() < 0.002) {
                ufo = new UFO();
            }

            // Update & Draw Entities
            ship.update(); ship.draw();

            if (ufo) {
                ufo.update(); ufo.draw();
                if (ufo.x > width + 50) ufo = null;
                // Ship hits UFO
                if (ufo && dist(ship.x, ship.y, ufo.x, ufo.y) < ship.r + ufo.r && ship.invulnerable <= 0) {
                    playerHit();
                }
            }

            // PowerUps
            for (let i = powerups.length - 1; i >= 0; i--) {
                let p = powerups[i]; p.update(); p.draw();
                if (dist(ship.x, ship.y, p.x, p.y) < ship.r + 10) {
                    if (p.type === 'shield') ship.shield = true;
                    if (p.type === 'spread') ship.spreadShot = 300;
                    powerups.splice(i, 1);
                } else if (p.life <= 0) {
                    powerups.splice(i, 1);
                }
            }

            // Player Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i]; b.update(); b.draw();
                let hit = false;
                
                // Hit UFO?
                if (ufo && dist(b.x, b.y, ufo.x, ufo.y) < ufo.r) {
                    score += 500; document.getElementById('scoreVal').innerText = score;
                    for(let k=0; k<20; k++) particles.push(new Particle(ufo.x, ufo.y, random(-4,4), random(-4,4), '#ff4757'));
                    ufo = null; hit = true; screenShake(10);
                }

                // Hit Asteroids?
                if (!hit) {
                    for (let j = asteroids.length - 1; j >= 0; j--) {
                        let a = asteroids[j];
                        if (dist(b.x, b.y, a.x, a.y) < a.r) {
                            a.break();
                            asteroids.splice(j, 1);
                            hit = true; break;
                        }
                    }
                }
                if (hit || b.life <= 0) bullets.splice(i, 1);
            }

            // UFO Bullets
            for (let i = ufoBullets.length - 1; i >= 0; i--) {
                let b = ufoBullets[i]; b.update(); b.draw();
                if (dist(b.x, b.y, ship.x, ship.y) < ship.r && ship.invulnerable <= 0) {
                    playerHit(); ufoBullets.splice(i, 1);
                } else if (b.life <= 0) {
                    ufoBullets.splice(i, 1);
                }
            }

            // Asteroid vs Player
            for (let a of asteroids) {
                a.update(); a.draw();
                if (dist(ship.x, ship.y, a.x, a.y) < ship.r + a.r * 0.8 && ship.invulnerable <= 0) {
                    playerHit();
                }
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            if (shakeTime > 0) ctx.restore();
        }

        function playerHit() {
            if (ship.shield) {
                ship.shield = false; ship.invulnerable = 60; screenShake(10);
                return;
            }
            lives--; updateLivesUI(); screenShake(20);
            for(let i=0; i<30; i++) particles.push(new Particle(ship.x, ship.y, random(-5,5), random(-5,5), '#00cec9'));
            if (lives <= 0) {
                triggerGameOver();
            } else {
                ship.x = width / 2; ship.y = height / 2;
                ship.velX = 0; ship.velY = 0;
                ship.invulnerable = 150;
            }
        }

        // Start
        initGame();
    </script>
</body>
</html>
